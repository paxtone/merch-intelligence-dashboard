name: Rebuild Dashboard Data

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12:00 UTC (7am ET)
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Rebuild data.json from Coupler.io
        env:
          COUPLER_API_TOKEN: ${{ secrets.COUPLER_API_TOKEN }}
        run: python build_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes detected"
          else
            git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
